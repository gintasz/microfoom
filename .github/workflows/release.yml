name: Release

# Tag-triggered lockstep publish: both public packages share one version.
# Cut a release locally, then push the tag:
#
#   pnpm -r exec npm version X.Y.Z --no-git-tag-version   # bump workspace packages
#   npm version X.Y.Z --no-git-tag-version --allow-same-version  # bump root too
#   git commit -am "release: vX.Y.Z"
#   git tag vX.Y.Z && git push --follow-tags
#
# The tag must equal the version in every package.json (root included) or the
# workflow's verify step aborts before publishing.
#
# Pushing a v* tag verifies the lockstep version, runs every deterministic gate,
# publishes to `latest` through npm trusted publishing, and then
# verifies clean SDK and global CLI installs from the registry.

on:
  push:
    tags: ["v*"]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the matching GitHub release
  id-token: write # npm provenance (trusted publishing)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      # check:full exercises Bun shebang execution and the standalone example.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # check:full runs //#spell (typos), which has no npm build; pin the binary
      # like CI does so the release gate matches the PR gate exactly.
      - uses: taiki-e/install-action@v2
        with:
          tool: typos@1.48.0

      - run: pnpm install --frozen-lockfile

      # Guard the lockstep invariant: the pushed tag must equal the version every
      # package.json carries. Without this, tag v0.2.0 over unbumped manifests would
      # silently (re)publish 0.1.0.
      - name: Verify tag matches package versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          mismatch=0
          while IFS= read -r pkg; do
            v="$(node -p "require('./$pkg').version")"
            if [ "$v" != "$tag" ]; then
              echo "::error file=$pkg::$pkg is $v, expected $tag (tag $GITHUB_REF_NAME)"
              mismatch=1
            fi
          done < <(git ls-files 'package.json' 'packages/*/package.json')
          [ "$mismatch" = 0 ] || exit 1

      # Full gate, identical to PR CI (build + typecheck + lint + tests + audit +
      # docs + api). A tag pushed directly, bypassing a PR, is still fully vetted.
      - run: pnpm run test:tui
      - run: pnpm run check:full

      - name: Publish and verify registry artifacts
        run: pnpm run release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 ||
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          --title "Unigent $GITHUB_REF_NAME"
